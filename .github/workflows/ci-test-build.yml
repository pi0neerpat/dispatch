name: ci-test-build

on:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          corepack: true

      # Runner image ships Yarn 1 at /usr/local/bin/yarn; it runs before Corepack
      # can take over (e.g. setup-node "cache: yarn" uses `yarn cache dir`).
      - name: Use Corepack Yarn only
        run: |
          sudo rm -f /usr/local/bin/yarn /usr/local/bin/yarnpkg
          corepack prepare yarn@4.9.1 --activate
          yarn --version

      - name: Install dependencies
        working-directory: dashboard
        run: yarn install --immutable

      - name: Run tests
        working-directory: dashboard
        run: yarn test

      - name: Build dashboard
        working-directory: dashboard
        run: yarn build
